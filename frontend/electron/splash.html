<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carregando...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: transparent;
      font-family: 'Segoe UI', -apple-system, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
      user-select: none;
    }

    .splash {
      width: 480px;
      height: 300px;
      background: linear-gradient(135deg, #0a0f1e 0%, #1a2238 100%);
      border-radius: 20px;
      border: 1px solid #2a3555;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(59,130,246,0.15);
    }

    .logo {
      font-size: 56px;
      animation: bounce 1.2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-size: 22px;
      font-weight: 800;
      color: #f1f5f9;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 13px;
      color: #64748b;
      margin-top: -12px;
    }

    .loader {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #8b5cf6; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #06b6d4; }

    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .status {
      font-size: 12px;
      color: #94a3b8;
      animation: fade 2s ease-in-out infinite;
    }

    @keyframes fade {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    .version {
      font-size: 10px;
      color: #374266;
      position: absolute;
      bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="logo">🏠</div>
    <div>
      <h1>Extrator de Imóveis</h1>
      <div class="subtitle">Facebook Groups · Segmento Imobiliário</div>
    </div>
    <div class="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="status" id="status">Iniciando serviços...</div>
    <div class="version">v1.0.0</div>
  </div>

  <script>
    const msgs = [
      'Iniciando serviços...',
      'Conectando ao banco de dados...',
      'Carregando workers...',
      'Preparando painel...',
      'Quase pronto!',
    ];
    let i = 0;
    setInterval(() => {
      i = (i + 1) % msgs.length;
      document.getElementById('status').textContent = msgs[i];
    }, 1200);
  </script>
</body>
</html>
